name: Deploy to GitHub Pages

# Optional host. For Vercel/Netlify/Cloudflare you do NOT need this file —
# they build from the repo directly. See DEPLOY.md.
#
# NOTE: GitHub Pages serves at https://<user>.github.io/<repo>/ unless you set a
# custom domain. If you are NOT using a custom domain, set `base: '/<repo>/'` and
# update `site` in astro.config.mjs, or canonical/OG/asset URLs will be wrong.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
